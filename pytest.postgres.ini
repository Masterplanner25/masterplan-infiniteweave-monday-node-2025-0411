[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = . AINDY
addopts = -q --disable-warnings -m "postgres or (not redis and not multi_instance)"
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    redis: requires a live Redis instance
    postgres: exercises behavior that differs between SQLite and PostgreSQL
    multi_instance: multi-instance Redis integration tests
env =
    TEST_MODE=true
    AINDY_ASYNC_HEAVY_EXECUTION=false
    DATABASE_URL=postgresql://aindy_test:aindy_test@localhost:5433/aindy_test
    AINDY_ALLOW_SQLITE=false
    AINDY_SKIP_MONGO_PING=true
    SKIP_MONGO_PING=true
    MONGO_URL=
    OPENAI_API_KEY=sk-test-key-for-pytest-only
    AINDY_ENFORCE_SCHEMA=false
