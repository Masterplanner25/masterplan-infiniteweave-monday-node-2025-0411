name: App CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app-contracts:
    name: App Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime and app test dependencies
        run: |
          python -m pip install "aindy-runtime>=1.0,<2.0"
          python -m pip install -e .[test] --no-build-isolation

      - name: Check cross-app import boundaries
        run: python scripts/check_app_imports.py

      - name: Validate bootstrap dependency declarations
        run: python -c "from apps._bootstrap_validator import validate_bootstrap_deps; validate_bootstrap_deps('apps'); print('Bootstrap deps OK')"

      - name: Lint documentation frontmatter
        run: python scripts/lint_docs.py

      - name: Check API contract drift
        run: python scripts/check_api_contracts.py

      - name: Run representative app-profile suite
        run: >
          python -m pytest
          tests/unit/test_app_manifest_bootstrap_contract.py
          tests/unit/test_import_boundaries.py
          tests/unit/test_runtime_agent_api_ownership.py
          tests/unit/test_tasks_public_contract.py
          tests/unit/test_analytics_public_contract.py
          tests/unit/test_app_model_registration.py
          tests/test_bootstrap_completeness.py
          -m app_profile
          -q

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - run: npm test -- runtime-only-shell.test.jsx

      - name: Client build smoke
        run: node scripts/validate-env.js
        env:
          VITE_API_BASE_URL: "https://ci-placeholder.aindy.dev"
