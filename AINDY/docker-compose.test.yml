services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aindy_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aindy_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_test_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  pg_test_data:
