server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Force HTTPS in browsers (1 year; adjust before enabling in mixed-protocol
    # environments where HTTP is intentional)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # HSTS is commented out: the default Docker setup serves on HTTP port 80.
    # Uncomment and deploy with TLS termination when HTTPS is confirmed.

    # Disable XSS auditor (deprecated but harmless; keep for old browser compat)
    add_header X-XSS-Protection "0" always;

    # Control Referer header leakage
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser feature access
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy
    # Assumptions:
    #   - API calls go to same origin or VITE_API_BASE_URL (configured at build time)
    #   - No inline scripts (React is compiled; no eval)
    #   - No inline styles (after Step 1 removes the dangerouslySetInnerHTML)
    #   - WebSocket connections to same origin for potential future use
    #   - Fonts and images from self only (no CDN)
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self';
        img-src 'self' data:;
        font-src 'self';
        connect-src 'self' https://api.stripe.com;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # ── Routing ─────────────────────────────────────────────────────────────

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────────────

    # Vite hashes all JS/CSS asset filenames — cache them aggressively
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-apply security headers (nginx add_header inheritance quirk:
        # headers defined in a parent block are NOT inherited when a location
        # block defines its own add_header directives)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self';
            style-src 'self';
            img-src 'self' data:;
            font-src 'self';
            connect-src 'self' https://api.stripe.com;
            frame-ancestors 'none';
            base-uri 'self';
            form-action 'self';
        " always;
    }
}
