[pytest]
asyncio_mode = auto
testpaths = tests/integration
pythonpath = . AINDY
addopts = -q --disable-warnings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
env =
    ENV=test
    TESTING=true
    TEST_MODE=true
    AINDY_ASYNC_HEAVY_EXECUTION=false
    AINDY_ALLOW_SQLITE=false
    AINDY_SKIP_MONGO_PING=false
    SKIP_MONGO_PING=false
    MONGO_URL=mongodb://localhost:27017
    MONGO_DB_NAME=aindy_test
    OPENAI_API_KEY=sk-test-key-for-pytest-only
    SECRET_KEY=test-secret-key-for-integration-only-0123456789
