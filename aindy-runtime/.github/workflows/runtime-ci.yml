name: Runtime CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  runtime-contracts:
    name: Runtime Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    env:
      ENV: test
      PYTHONPATH: .
      TESTING: "true"
      TEST_MODE: "true"
      DATABASE_URL: sqlite:///:memory:
      AINDY_ALLOW_SQLITE: "true"
      AINDY_SKIP_MONGO_PING: "true"
      SKIP_MONGO_PING: "true"
      MONGO_URL: ""
      OPENAI_API_KEY: sk-test-placeholder
      DEEPSEEK_API_KEY: ds-test-placeholder
      SECRET_KEY: ci-runtime-secret-key
      PERMISSION_SECRET: ci-runtime-permission-secret
      AINDY_API_KEY: ci-runtime-api-key
      ALLOWED_ORIGINS: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-runtime-pip-${{ hashFiles('AINDY/requirements.txt', 'pyproject.toml') }}
          restore-keys: ${{ runner.os }}-runtime-pip-

      - name: Install runtime dependencies
        run: pip install -r AINDY/requirements.txt

      - name: Install runtime package (editable)
        run: python -m pip install -e . --no-deps --no-build-isolation

      - name: Verify runtime console entrypoints
        run: |
          python - <<'PY'
          import importlib.metadata as md

          console_scripts = {
              ep.name: ep.value
              for ep in md.entry_points(group="console_scripts")
              if ep.name in {"aindy-runtime", "aindy-runtime-api"}
          }
          assert console_scripts == {
              "aindy-runtime": "AINDY.runtime_only:main",
              "aindy-runtime-api": "AINDY.main:main",
          }
          print(console_scripts)
          PY

      - name: Run runtime-only contract suite
        run: >
          python -m pytest
          tests/unit/test_runtime_only_test_fixtures.py
          tests/unit/test_platform_only_startup.py
          tests/unit/test_runtime_packaging.py
          tests/unit/test_runtime_boundary.py
          tests/unit/test_runtime_compatibility_metadata.py
          tests/api/test_version_api.py
          -m runtime_only
          -q
