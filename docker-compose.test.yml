services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: aindy_test
      POSTGRES_PASSWORD: aindy_test
      POSTGRES_DB: aindy_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aindy_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_test_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg_test_data:
