global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: aindy-api
    scrape_interval: 15s
    static_configs:
      - targets:
          - api:8000

