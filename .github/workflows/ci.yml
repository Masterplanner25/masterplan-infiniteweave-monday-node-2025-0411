name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AINDY

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.15.6

      - name: Run ruff
        run: ruff check .

  docs-lint:
    name: Docs Frontmatter Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint documentation frontmatter
        run: python scripts/lint_docs.py

      - name: Check API contract drift
        run: python scripts/check_api_contracts.py

      - name: Check for stale docs (warning only)
        run: python scripts/lint_docs.py || true

  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENV: test
      PYTHONPATH: .
      TESTING: "true"
      TEST_MODE: "true"
      MONGO_URL: mongodb://localhost:27017
      MONGO_DB_NAME: aindy_test
      OPENAI_API_KEY: sk-test-placeholder
      DEEPSEEK_API_KEY: ds-test-placeholder
      SECRET_KEY: ci-secret-key-placeholder
      PERMISSION_SECRET: ci-permission-secret
      AINDY_API_KEY: ci-aindy-api-key
      ALLOWED_ORIGINS: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('AINDY/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Check cross-app import boundaries
        run: python scripts/check_app_imports.py

      - name: Validate bootstrap dependency declarations
        run: python -c "from apps._bootstrap_validator import validate_bootstrap_deps; validate_bootstrap_deps('apps'); print('Bootstrap deps OK')"

      - name: Install dependencies
        run: pip install -r AINDY/requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL readiness
        run: |
          until pg_isready -h localhost -p 5432 -U test; do
            echo "Waiting for postgres..."
            sleep 2
          done
        env:
          PGPASSWORD: test

      - name: Run alembic migrations
        working-directory: ${{ github.workspace }}
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db

      - name: Verify migrations at head
        working-directory: ${{ github.workspace }}
        run: alembic check
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db

      - name: Confirm repo root contents
        run: ls -la

      - name: Guard coverage omit list
        run: |
          python - <<'PY'
          import configparser
          import sys

          cfg = configparser.ConfigParser()
          cfg.read(".coveragerc")
          raw = cfg.get("run", "omit", fallback="")
          omit_entries = {
              line.strip()
              for line in raw.splitlines()
              if line.strip()
          }
          allowed = {
              "*/tests/*",
              "*/venv/*",
              "*/.venv/*",
              "*/site-packages/*",
              "alembic/*",
              "*/migrations/*",
              "tools/*",
              "validate_memory_loop.py",
              "Single File Engine.py",
              "Nodus_Runner.py",
          }
          forbidden_entries = {
              "*/routes/*",
              "*/memory/*",
              "*/nodus/*",
              "*/worker/*",
              "*/sdk/*",
              "*/watcher/*",
          }

          unexpected = sorted(omit_entries - allowed)
          forbidden = sorted(
              entry for entry in omit_entries
              if entry in forbidden_entries
          )

          if unexpected or forbidden:
              if unexpected:
                  print("Unexpected coverage omit entries:", unexpected)
              if forbidden:
                  print("Forbidden production coverage omit entries:", forbidden)
              sys.exit(1)

          print("Coverage omit list verified:", sorted(omit_entries))
          PY

      - name: Run tests with coverage
        run: pytest -m "not redis" --ignore=tests/validate_memory_loop.py --tb=short --cov=AINDY --cov=apps --cov-report=xml:AINDY/coverage.xml --cov-fail-under=68 -q

      - name: Generate API reference
        run: PYTHONPATH=. python tools/generate_api_reference.py
        env:
          DATABASE_URL: sqlite:///tmp_docgen.db
          SECRET_KEY: docgen-placeholder
          ENV: dev

      - name: Run integration tests (PostgreSQL)
        working-directory: ${{ github.workspace }}
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/1
          ENV: test
          AINDY_TEST_DB: postgres
          AINDY_ALLOW_SQLITE: "false"
          TESTING: "true"
          TEST_MODE: "true"
          AINDY_SKIP_MONGO_PING: "false"
          SKIP_MONGO_PING: "false"
          MONGO_URL: mongodb://localhost:27017
          MONGO_DB_NAME: aindy_test
          SECRET_KEY: ci-secret-key-placeholder
          OPENAI_API_KEY: sk-test-placeholder
          DEEPSEEK_API_KEY: ds-test-placeholder
          AINDY_API_KEY: ci-aindy-api-key
          ALLOWED_ORIGINS: "http://localhost:3000"
        run: pytest -c pytest.integration.ini -vv --durations=25 -ra

      - name: Guard apps package imports
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path("apps")
          pattern = re.compile(
              r"^\s*(?:from\s+(runtime|services|kernel|core|db)\b|import\s+(runtime|services|kernel|core|db)\b|from\s+config\s+import\b)"
          )

          violations: list[str] = []
          for path in root.rglob("*.py"):
              for lineno, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  if pattern.search(line):
                      violations.append(f"{path}:{lineno}:{line.strip()}")

          if violations:
              print("VIOLATION: bare package-boundary import found in apps/")
              for violation in violations:
                  print(violation)
              sys.exit(1)

          print("apps import guard passed")
          PY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: AINDY/coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        timeout-minutes: 2
        with:
          file: AINDY/coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  test-postgres:
    name: Test (PostgreSQL mode)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    needs: test
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: aindy_test
          POSTGRES_PASSWORD: aindy_test
          POSTGRES_DB: aindy_test
        options: >-
          --health-cmd="pg_isready -U aindy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    env:
      ENV: test
      PYTHONPATH: .
      TEST_MODE: "true"
      TESTING: "true"
      DATABASE_URL: postgresql://aindy_test:aindy_test@localhost:5433/aindy_test
      AINDY_ALLOW_SQLITE: "false"
      AINDY_SKIP_MONGO_PING: "true"
      SKIP_MONGO_PING: "true"
      MONGO_URL: ""
      OPENAI_API_KEY: sk-test-placeholder
      DEEPSEEK_API_KEY: ds-test-placeholder
      SECRET_KEY: ci-secret-key-placeholder
      PERMISSION_SECRET: ci-permission-secret
      AINDY_API_KEY: ci-aindy-api-key
      ALLOWED_ORIGINS: "http://localhost:3000"
      AINDY_ENFORCE_SCHEMA: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('AINDY/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r AINDY/requirements.txt psycopg2-binary

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL readiness
        run: |
          until pg_isready -h localhost -p 5433 -U aindy_test; do
            echo "Waiting for postgres..."
            sleep 2
          done
        env:
          PGPASSWORD: aindy_test

      - name: Run tests against PostgreSQL
        run: pytest -c pytest.postgres.ini

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - run: npm test

      - name: Client build smoke (validate env script)
        working-directory: client
        run: node scripts/validate-env.js
        env:
          VITE_API_BASE_URL: "https://ci-placeholder.aindy.dev"

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build application image
        run: docker build -f Dockerfile -t aindy-ci:latest .
