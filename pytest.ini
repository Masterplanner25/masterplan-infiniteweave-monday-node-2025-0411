[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = . AINDY
addopts = -q --disable-warnings
    --cov=AINDY/core
    --cov=AINDY/runtime
    --cov=AINDY/platform_layer
    --cov=AINDY/db
    --cov=AINDY/agents
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=30
python_files = test_*.py
python_classes = Test*
python_functions = test_*
env =
    TEST_MODE=true
    AINDY_ASYNC_HEAVY_EXECUTION=false
    DATABASE_URL=sqlite:///:memory:
    AINDY_ALLOW_SQLITE=true
    AINDY_SKIP_MONGO_PING=true
    SKIP_MONGO_PING=true
    MONGO_URL=
    OPENAI_API_KEY=sk-test-key-for-pytest-only
