[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = . AINDY
addopts = -q --disable-warnings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    redis: requires a live Redis instance
    postgres: exercises behavior that differs between SQLite and PostgreSQL (FK cascades, JSONB, UUID)
    multi_instance: multi-instance Redis integration tests (require fakeredis)
env =
    TEST_MODE=true
    ENFORCE_EXECUTION_CONTRACT=true
    AINDY_ASYNC_HEAVY_EXECUTION=false
    DATABASE_URL=sqlite:///:memory:
    AINDY_ALLOW_SQLITE=true
    AINDY_SKIP_MONGO_PING=true
    SKIP_MONGO_PING=true
    MONGO_URL=
    OPENAI_API_KEY=sk-test-key-for-pytest-only
