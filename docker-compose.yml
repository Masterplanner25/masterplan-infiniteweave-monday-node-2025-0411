# Usage:
#   docker compose up                  # quickstart: postgres + api (single instance, in-memory cache)
#   REDIS_URL=redis://redis:6379/0 docker compose --profile full up
#                                     # full stack / multi-instance: shared Redis cache
#   docker compose --profile social up # adds MongoDB for social features

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - AINDY/.env
    command: sh -c "alembic -c alembic.ini upgrade head && uvicorn AINDY.main:app --host 0.0.0.0 --port 8000"
    environment:
      # Quickstart intentionally leaves REDIS_URL unset so the api falls back to
      # single-process in-memory cache. For multi-instance deployments, set
      # REDIS_URL to a shared Redis and keep AINDY_CACHE_BACKEND=redis.
      SKIP_MONGO_PING: ${SKIP_MONGO_PING:-true}
      AINDY_SKIP_MONGO_PING: ${AINDY_SKIP_MONGO_PING:-true}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AINDY_SERVICE_KEY: ${AINDY_SERVICE_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_in_production}
      REDIS_URL: ${REDIS_URL:-}
      AINDY_CACHE_BACKEND: ${AINDY_CACHE_BACKEND:-redis}
      EXECUTION_MODE: ${EXECUTION_MODE:-distributed}
      AINDY_ENABLE_BACKGROUND_TASKS: "false"
      AINDY_ENABLE_LEGACY_SURFACE: "false"
      AINDY_ASYNC_HEAVY_EXECUTION: ${AINDY_ASYNC_HEAVY_EXECUTION:-true}
      AINDY_ASYNC_JOB_WORKERS: ${AINDY_ASYNC_JOB_WORKERS:-4}
      AINDY_ENFORCE_SCHEMA: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
        required: false
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - AINDY/.env
    command: python -m AINDY.worker
    profiles: ["full"]
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AINDY_SERVICE_KEY: ${AINDY_SERVICE_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_in_production}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AINDY_CACHE_BACKEND: ${AINDY_CACHE_BACKEND:-redis}
      EXECUTION_MODE: ${EXECUTION_MODE:-distributed}
      AINDY_ENABLE_BACKGROUND_TASKS: "true"
      AINDY_ENABLE_LEGACY_SURFACE: "false"
      AINDY_ASYNC_HEAVY_EXECUTION: "false"
      AINDY_ENFORCE_SCHEMA: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_NETWORK_API_URL: ${VITE_NETWORK_API_URL:-/api/users}
    profiles: ["full"]
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:80"

  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - AINDY/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-aindy} -d $${POSTGRES_DB:-aindy}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_production}
    profiles: ["full"]
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    env_file:
      - AINDY/.env
    profiles: ["full", "social"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
