[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name          tail
    Path          /var/log/aindy/*.log
    Tag           aindy.*
    Parser        json
    Refresh_Interval 5

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224

[FILTER]
    Name          record_modifier
    Match         aindy.*
    Record        host ${HOSTNAME}
    Record        service aindy

[OUTPUT]
    Name          stdout
    Match         *
    Format        json_lines

