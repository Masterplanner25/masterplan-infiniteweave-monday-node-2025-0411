# AINDY nginx configuration - serves domain app and platform app from one origin.
# Platform UI is served under /platform/* and requires is_admin at the API level.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy - forward /api/* to the backend
    location /api/ {
        proxy_pass http://aindy-web:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Platform UI - serve from platform.html for all /platform/* routes
    location /platform/ {
        try_files $uri /platform.html;
    }

    # Platform static assets
    location /platform/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Domain app static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Domain app - catch-all for SPA client-side routing
    location / {
        try_files $uri /index.html;
    }
}
